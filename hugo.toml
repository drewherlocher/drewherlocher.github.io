baseURL = 'https://drewherlocher.github.io/'
title = "Drew Herlocher"
theme = "re-terminal"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true
disableKinds = ["RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[author]
  name = "Drew Herlocher"
  email = "drewmychiskyt@gmail.com"

[params]
author = "Drew Herlocher"
description = "Game Programming student at Champlain College, graduating May 2026. I build games, interactive experiences, and the AI systems that make them feel alive. Based in Burlington, VT — originally from New York City."
colorScheme = "auto"
themeColor = "pink"
centerTheme = true
contentTypeName = "blog"
readingTime = true

  [params.banner]
  dismissible = true
  text = "🎮 Check out my latest game — Chyma and the Toll of Time!"
  url = "https://ethansong59.itch.io/beware"

