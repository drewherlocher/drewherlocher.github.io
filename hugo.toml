baseURL = 'https://drewherlocher.github.io/'
title = "Drew Herlocher"
theme = "re-terminal"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true
disableKinds = ["RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[author]
  name = "Drew Herlocher"
  email = "drewmychiskyt@gmail.com"

[params]
  author = "Drew Herlocher"
  description = "Game Programming student at Champlain College, graduating May 2026. I build games, focusing on making the graphical tools for artists and designers, and the AI systems that make the games feel alive. Based in Burlington, VT — originally from New York City."
  themeColor = "pink"
  centerTheme = true
  contentTypeName = "blog"

  [params.banner]
    dismissible = true
    text = "Check out my latest game on Steam! — Chyma and the Toll of Time!"
    url = "https://store.steampowered.com/app/4555180/Chyma_and_the_Toll_of_Time/"

[[params.social]]
  name = "Github"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/drewherlocher/"

[[params.social]]
  name = "Email"
  icon = "fa-solid fa-envelope fa-2x"
  weight = 2
  url = "mailto:drewmychiskyt@gmail.com"

[languages]
  [languages.en]
    languageName = "English"

  [languages.en.params]
    subtitle = "Game Programmer"
    copyright = "Drew Herlocher"
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer posts"
    olderPosts = "Older posts"
    missingContentMessage = "Page not found..."
    missingBackButtonLabel = "Back to home page"

    [languages.en.params.logo]
      logoText = "void DrewHerlocher()"
      logoHomeLink = "/"

  [[languages.en.menu.main]]
    name = "About"
    weight = 1
    url = "/about/"

  [[languages.en.menu.main]]
    name = "Projects"
    weight = 2
    url = "/projects/"

  [[languages.en.menu.main]]
    name = "Resume"
    weight = 3
    url = "/resume/"

  [[languages.en.menu.main]]
    name = "Blog"
    weight = 4
    url = "/blog/"

  [[languages.en.menu.main]]
    name = "Contact"
    weight = 5
    url = "/contact/"